<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>La Bonne Note — Setup</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #333;
      background: #f5f5f5;
      line-height: 1.5;
    }
    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 40px 20px 60px;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 32px;
    }
    .header h1 {
      font-size: 28px;
      margin-bottom: 4px;
    }
    .header .subtitle {
      color: #666;
      font-size: 15px;
    }
    .header .intro {
      margin-top: 16px;
      color: #555;
      font-size: 14px;
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
    }

    /* Provider cards */
    .provider-card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      margin-bottom: 16px;
      overflow: hidden;
      transition: box-shadow 0.2s;
    }
    .provider-card:hover {
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .provider-card.configured {
      border-color: #00CCBC;
    }

    .card-header {
      display: flex;
      align-items: center;
      padding: 16px 20px;
      cursor: pointer;
      user-select: none;
    }
    .card-header:hover {
      background: #fafafa;
    }
    .card-icon {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 12px;
      flex-shrink: 0;
    }
    .card-icon svg, .card-icon img {
      width: 24px;
      height: 24px;
    }
    .card-title {
      flex: 1;
    }
    .card-title h2 {
      font-size: 16px;
      font-weight: 600;
    }
    .card-title .card-desc {
      font-size: 12px;
      color: #888;
    }
    .card-status {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 12px;
      white-space: nowrap;
      margin-left: 12px;
    }
    .card-status.configured {
      background: #e8f5e9;
      color: #2e7d32;
    }
    .card-status.not-configured {
      background: #fff3e0;
      color: #e65100;
    }
    .card-status.free {
      background: #e8f5e9;
      color: #2e7d32;
    }
    .card-chevron {
      margin-left: 8px;
      color: #999;
      transition: transform 0.2s;
      font-size: 12px;
    }
    .card-header[aria-expanded="true"] .card-chevron {
      transform: rotate(90deg);
    }

    .card-body {
      display: none;
      padding: 0 20px 20px;
      border-top: 1px solid #f0f0f0;
    }
    .card-body.open {
      display: block;
    }

    /* Steps */
    .steps {
      counter-reset: step;
      list-style: none;
      padding: 16px 0 0;
    }
    .steps li {
      counter-increment: step;
      position: relative;
      padding-left: 36px;
      margin-bottom: 14px;
      font-size: 14px;
    }
    .steps li::before {
      content: counter(step);
      position: absolute;
      left: 0;
      top: 0;
      width: 24px;
      height: 24px;
      background: #00CCBC;
      color: #fff;
      border-radius: 50%;
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .steps a {
      color: #00CCBC;
      font-weight: 500;
      text-decoration: none;
    }
    .steps a:hover {
      text-decoration: underline;
    }

    .note {
      background: #f8f9fa;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 12px;
      color: #555;
      margin-top: 12px;
    }
    .note strong {
      color: #333;
    }

    /* Inline API key input */
    .key-input-row {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }
    .key-input-row input {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 13px;
      font-family: monospace;
    }
    .key-input-row input:focus {
      outline: none;
      border-color: #00CCBC;
      box-shadow: 0 0 0 2px rgba(0, 204, 188, 0.15);
    }
    .key-input-row input.saved {
      border-color: #2e7d32;
    }
    .key-input-row button {
      padding: 10px 20px;
      background: #00CCBC;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
    }
    .key-input-row button:hover {
      background: #00b8a9;
    }
    .key-input-row button.saved {
      background: #2e7d32;
    }
    .key-feedback {
      font-size: 12px;
      margin-top: 6px;
      min-height: 18px;
    }
    .key-feedback.success {
      color: #2e7d32;
    }
    .key-feedback.error {
      color: #c62828;
    }

    /* Free provider */
    .free-notice {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 16px 0 0;
      font-size: 14px;
      color: #2e7d32;
    }
    .free-notice .checkmark {
      width: 24px;
      height: 24px;
      background: #e8f5e9;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 14px;
    }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 32px;
    }
    .done-btn {
      padding: 12px 48px;
      background: #00CCBC;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
    }
    .done-btn:hover {
      background: #00b8a9;
    }
    .footer-hint {
      margin-top: 12px;
      font-size: 12px;
      color: #999;
    }
    .footer-hint a {
      color: #00CCBC;
      text-decoration: none;
    }
    .footer-hint a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>La Bonne Note</h1>
      <div class="subtitle">Setup Guide</div>
      <p class="intro">
        Configure your rating providers below. Each provider adds ratings from a different source.
        You can set up as many or as few as you like — Allocine works out of the box with no configuration.
      </p>
    </div>

    <div id="providers"></div>

    <div class="footer">
      <button class="done-btn" id="doneBtn">Done</button>
      <div class="footer-hint">
        You can always reopen this guide from the extension popup.
        <br>
        <a href="https://github.com/HenriChabert/la-bonne-note" target="_blank">Documentation</a>
      </div>
    </div>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
