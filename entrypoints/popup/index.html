<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="manifest.default_icon"
        content='{ "16": "icons/icon16.png", "48": "icons/icon48.png", "128": "icons/icon128.png" }'>
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #333;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 12px 0;
    }
    label {
      display: block;
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
    }
    .provider-section {
      margin-bottom: 12px;
      padding: 8px 10px;
      background: #fafafa;
      border-radius: 6px;
      border: 1px solid #eee;
    }
    .provider-header {
      font-size: 12px;
      font-weight: 600;
      color: #444;
      margin-bottom: 6px;
    }
    .provider-header .provider-icon {
      display: inline-flex;
      vertical-align: middle;
      margin-right: 4px;
    }
    .provider-header .provider-icon svg {
      width: 14px;
      height: 14px;
    }
    input[type="number"] {
      width: 100%;
      padding: 6px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 12px;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: #00CCBC;
    }
    .range-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .range-row input[type="range"] {
      flex: 1;
    }
    .range-value {
      font-weight: 600;
      font-size: 12px;
      min-width: 24px;
      text-align: right;
    }
    .field {
      margin-bottom: 6px;
    }
    .toggle-row {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }
    .toggle-row button {
      flex: 1;
      padding: 6px;
      font-size: 12px;
      background: #e8eaed;
      color: #333;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .toggle-row button.active {
      background: #00CCBC;
      color: #fff;
    }
    .toggle-row button:hover:not(.active) {
      background: #ddd;
    }
    button.save-btn {
      margin-top: 8px;
      width: 100%;
      padding: 8px;
      background: #00CCBC;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
    }
    button.save-btn:hover {
      background: #00b8a9;
    }
    #status {
      margin-top: 6px;
      font-size: 12px;
      color: #666;
    }
    #status.saved {
      color: #2e7d32;
    }
    .settings-link {
      display: block;
      margin-top: 10px;
      text-align: center;
      font-size: 12px;
      color: #00CCBC;
      cursor: pointer;
      text-decoration: none;
    }
    .settings-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>La Bonne Note</h1>

  <div class="field">
    <label>Below threshold</label>
    <div class="toggle-row">
      <button id="modeDim" class="active">Dim</button>
      <button id="modeHide">Hide</button>
    </div>
  </div>

  <div id="providerFilters"></div>

  <button class="save-btn" id="save">Save</button>
  <div id="status"></div>

  <a id="openSettings" class="settings-link">API Key Settings</a>

  <script type="module" src="./main.ts"></script>
</body>
</html>
