<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="manifest.default_icon"
        content='{ "16": "icons/icon16.png", "48": "icons/icon48.png", "128": "icons/icon128.png" }'>
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #333;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 2px 0;
    }
    .subtitle {
      font-size: 11px;
      color: #999;
      margin: 0 0 12px 0;
    }
    label {
      display: block;
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
    }
    .provider-section {
      margin-bottom: 12px;
      padding: 8px 10px;
      background: #fafafa;
      border-radius: 6px;
      border: 1px solid #eee;
    }
    .provider-header {
      display: flex;
      align-items: center;
      font-size: 12px;
      font-weight: 600;
      color: #444;
      margin-bottom: 6px;
    }
    .provider-header .provider-icon {
      display: inline-flex;
      vertical-align: middle;
      margin-right: 4px;
    }
    .provider-header .provider-icon svg,
    .provider-header .provider-icon img {
      width: 14px;
      height: 14px;
    }
    .provider-header .provider-name {
      flex: 1;
    }
    .switch--small {
      width: 32px;
      height: 18px;
      margin-left: 8px;
      flex-shrink: 0;
    }
    .switch--small .slider::before {
      width: 12px;
      height: 12px;
      left: 3px;
      bottom: 3px;
    }
    .switch--small input:checked + .slider::before {
      transform: translateX(14px);
    }
    .switch input:disabled + .slider {
      background: #e0e0e0;
      cursor: not-allowed;
    }
    .provider-warning {
      font-size: 11px;
      color: #e65100;
      margin-bottom: 4px;
    }
    .provider-warning a {
      color: #00CCBC;
      text-decoration: none;
    }
    .provider-warning a:hover {
      text-decoration: underline;
    }
    input[type="number"] {
      width: 100%;
      padding: 6px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 12px;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: #00CCBC;
    }
    .range-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .range-row input[type="range"] {
      flex: 1;
    }
    .range-value {
      font-weight: 600;
      font-size: 12px;
      min-width: 24px;
      text-align: right;
    }
    .field {
      margin-bottom: 6px;
    }
    .toggle-row {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }
    .toggle-row button {
      flex: 1;
      padding: 6px;
      font-size: 12px;
      background: #e8eaed;
      color: #333;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .toggle-row button.active {
      background: #00CCBC;
      color: #fff;
    }
    .toggle-row button:hover:not(.active) {
      background: #ddd;
    }
    .btn-row {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }
    button.save-btn {
      flex: 1;
      padding: 8px;
      background: #00CCBC;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
    }
    button.save-btn:hover {
      background: #00b8a9;
    }
    button.reset-btn {
      padding: 8px 12px;
      background: #e8eaed;
      color: #333;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
    }
    button.reset-btn:hover {
      background: #ddd;
    }
    #status {
      margin-top: 6px;
      font-size: 12px;
      color: #666;
    }
    #status.saved {
      color: #2e7d32;
    }
    .footer-links {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
    }
    .footer-links a {
      font-size: 12px;
      color: #00CCBC;
      cursor: pointer;
      text-decoration: none;
    }
    .footer-links a:hover {
      text-decoration: underline;
    }
    .footer-links .separator {
      color: #ccc;
      font-size: 12px;
      user-select: none;
    }
    .placeholder {
      text-align: center;
      color: #999;
      font-size: 12px;
      padding: 12px 0;
    }
    .site-warning {
      display: none;
      background: #fff8e1;
      border: 1px solid #ffe082;
      border-radius: 6px;
      padding: 8px 10px;
      margin-bottom: 12px;
      font-size: 11px;
      color: #6d4c00;
      line-height: 1.4;
    }
    .site-warning a {
      color: #e65100;
      font-weight: 600;
      text-decoration: none;
    }
    .site-warning a:hover {
      text-decoration: underline;
    }
    .enable-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid #eee;
    }
    .enable-label {
      font-size: 13px;
      font-weight: 500;
      color: #333;
    }
    .switch {
      position: relative;
      width: 40px;
      height: 22px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .switch .slider {
      position: absolute;
      inset: 0;
      background: #ccc;
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .switch .slider::before {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .switch input:checked + .slider {
      background: #00CCBC;
    }
    .switch input:checked + .slider::before {
      transform: translateX(18px);
    }
  </style>
</head>
<body>
  <h1>La Bonne Note</h1>
  <div class="subtitle">by Web Autopilot</div>

  <div class="enable-row">
    <span class="enable-label">Enabled</span>
    <label class="switch">
      <input type="checkbox" id="enableToggle" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div id="siteWarning" class="site-warning"></div>

  <div id="placeholder" class="placeholder">Navigate to a supported site to configure filters.</div>

  <div id="filterControls" style="display: none;">
    <div class="field">
      <label>Below threshold</label>
      <div class="toggle-row">
        <button id="modeDim" class="active">Dim</button>
        <button id="modeHide">Hide</button>
      </div>
    </div>

    <div id="providerFilters"></div>

    <div class="btn-row">
      <button class="save-btn" id="save">Save</button>
      <button class="reset-btn" id="reset">Reset</button>
    </div>
    <div id="status"></div>
  </div>

  <div class="footer-links">
    <a id="openSettings" href="#">Settings</a>
    <span class="separator">|</span>
    <a href="https://github.com/HenriChabert/la-bonne-note" target="_blank">Documentation</a>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
