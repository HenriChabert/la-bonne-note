<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="manifest.open_in_tab" content="true">
  <title>La Bonne Note — Settings</title>
  <style>
    body {
      max-width: 480px;
      margin: 40px auto;
      padding: 0 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #333;
    }
    h1 {
      font-size: 22px;
      margin: 0 0 4px 0;
    }
    .subtitle {
      font-size: 13px;
      color: #888;
      margin-bottom: 24px;
    }
    .field {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #555;
      margin-bottom: 4px;
    }
    input[type="password"] {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #00CCBC;
      box-shadow: 0 0 0 2px rgba(0, 204, 188, 0.15);
    }
    select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
      background: #fff;
    }
    hr {
      border: none;
      border-top: 1px solid #eee;
      margin: 20px 0;
    }
    .hint {
      font-size: 11px;
      color: #999;
      margin-top: 4px;
    }
    .hint a {
      color: #00CCBC;
    }
    button {
      margin-top: 8px;
      padding: 10px 24px;
      background: #00CCBC;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover {
      background: #00b8a9;
    }
    #status {
      margin-top: 10px;
      font-size: 13px;
      color: #666;
    }
    #status.saved {
      color: #2e7d32;
    }
    #status.error {
      color: #c62828;
    }
    .clear-cache {
      margin-top: 6px;
      padding: 4px 12px;
      background: none;
      color: #999;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
    }
    .clear-cache:hover {
      color: #333;
      border-color: #bbb;
      background: #f5f5f5;
    }
  </style>
</head>
<body>
  <h1>La Bonne Note</h1>
  <div class="subtitle">Settings</div>

  <div id="apiKeys"></div>

  <hr>

  <div class="field">
    <label for="logLevel">Console log level</label>
    <select id="logLevel">
      <option value="off">Off</option>
      <option value="error" selected>Error</option>
      <option value="warn">Warn</option>
      <option value="info">Info</option>
      <option value="debug">Debug</option>
    </select>
    <div class="hint">Open DevTools console to see logs prefixed with [La Bonne Note]</div>
  </div>

  <button id="save">Save</button>
  <div id="status"></div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
