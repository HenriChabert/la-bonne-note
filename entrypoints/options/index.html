<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="manifest.open_in_tab" content="true">
  <title>La Bonne Note — Settings</title>
  <style>
    * { box-sizing: border-box; }
    body {
      max-width: 640px;
      margin: 40px auto;
      padding: 0 20px 60px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #333;
      background: #f5f5f5;
    }

    /* Header */
    h1 { font-size: 24px; margin: 0 0 4px 0; }
    .subtitle { font-size: 13px; color: #888; margin-bottom: 8px; }

    /* Section headings */
    .section-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888;
      margin: 28px 0 12px;
    }

    /* ── Provider cards ── */
    .provider-card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      margin-bottom: 12px;
      overflow: hidden;
      transition: box-shadow 0.2s;
    }
    .provider-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .provider-card.configured { border-color: #00CCBC; }

    .card-header {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
    }
    .card-header:hover { background: #fafafa; }
    .card-icon {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      margin-right: 10px; flex-shrink: 0;
    }
    .card-icon svg, .card-icon img { width: 20px; height: 20px; }
    .card-title { flex: 1; }
    .card-title h2 { font-size: 15px; font-weight: 600; margin: 0; }
    .card-title .card-desc { font-size: 11px; color: #888; margin: 0; }

    .card-status {
      font-size: 11px; font-weight: 600;
      padding: 3px 10px; border-radius: 12px;
      white-space: nowrap; margin-left: 10px;
    }
    .card-status.configured { background: #e8f5e9; color: #2e7d32; }
    .card-status.not-configured { background: #fff3e0; color: #e65100; }
    .card-status.free { background: #e8f5e9; color: #2e7d32; }

    .card-chevron {
      margin-left: 8px; color: #999;
      transition: transform 0.2s; font-size: 12px;
    }
    .card-header[aria-expanded="true"] .card-chevron {
      transform: rotate(90deg);
    }

    .card-body {
      display: none;
      padding: 0 16px 16px;
      border-top: 1px solid #f0f0f0;
    }
    .card-body.open { display: block; }

    /* Steps */
    .steps { counter-reset: step; list-style: none; padding: 14px 0 0; margin: 0; }
    .steps li {
      counter-increment: step;
      position: relative;
      padding-left: 36px;
      margin-bottom: 14px;
      font-size: 14px;
    }
    .steps li::before {
      content: counter(step);
      position: absolute; left: 0; top: 0;
      width: 24px; height: 24px;
      background: #00CCBC; color: #fff;
      border-radius: 50%;
      font-size: 12px; font-weight: 600;
      display: flex; align-items: center; justify-content: center;
    }
    .step-detail {
      font-size: 13px; color: #666;
      margin: 4px 0 6px; font-weight: 400; line-height: 1.5;
    }
    .steps a {
      color: #00CCBC; font-weight: 500;
      text-decoration: none; display: inline-block; margin-top: 2px;
    }
    .steps a:hover { text-decoration: underline; }

    .note {
      background: #f8f9fa; border-radius: 6px;
      padding: 10px 14px; font-size: 12px; color: #555;
      margin-top: 12px;
    }
    .note strong { color: #333; }

    /* Inline API key input */
    .key-input-row { display: flex; gap: 8px; margin-top: 14px; }
    .key-input-row input {
      flex: 1; padding: 10px 12px;
      border: 1px solid #ccc; border-radius: 6px;
      font-size: 13px; font-family: monospace;
    }
    .key-input-row input:focus {
      outline: none; border-color: #00CCBC;
      box-shadow: 0 0 0 2px rgba(0,204,188,0.15);
    }
    .key-input-row input.saved { border-color: #2e7d32; }
    .key-input-row button {
      padding: 10px 20px; background: #00CCBC; color: #fff;
      border: none; border-radius: 6px;
      font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap;
    }
    .key-input-row button:hover { background: #00b8a9; }
    .key-input-row button.saved { background: #2e7d32; }
    .key-feedback { font-size: 12px; margin-top: 6px; min-height: 18px; }
    .key-feedback.success { color: #2e7d32; }
    .key-feedback.error { color: #c62828; }

    /* Free provider */
    .free-notice {
      display: flex; align-items: center; gap: 8px;
      padding: 14px 0 0; font-size: 14px; color: #2e7d32;
    }
    .free-notice .checkmark {
      width: 24px; height: 24px;
      background: #e8f5e9; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 14px;
    }

    /* Cache clear */
    .clear-cache {
      margin-top: 8px; padding: 4px 12px;
      background: none; color: #999;
      border: 1px solid #ddd; border-radius: 4px;
      font-size: 12px; cursor: pointer;
    }
    .clear-cache:hover { color: #333; border-color: #bbb; background: #f5f5f5; }

    /* ── General settings ── */
    .settings-card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 16px;
    }
    .field { margin-bottom: 14px; }
    .field:last-child { margin-bottom: 0; }
    .field label {
      display: block; font-size: 13px;
      font-weight: 500; color: #555; margin-bottom: 4px;
    }
    select {
      width: 100%; padding: 8px 10px;
      border: 1px solid #ccc; border-radius: 6px;
      font-size: 14px; background: #fff;
    }
    select:focus {
      outline: none; border-color: #00CCBC;
      box-shadow: 0 0 0 2px rgba(0,204,188,0.15);
    }
    .hint { font-size: 11px; color: #999; margin-top: 4px; }
    .hint a { color: #00CCBC; text-decoration: none; }
    .hint a:hover { text-decoration: underline; }

    /* Footer */
    .footer {
      text-align: center; margin-top: 24px;
      font-size: 12px; color: #999;
    }
    .footer a { color: #00CCBC; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>La Bonne Note</h1>
  <div class="subtitle">Settings</div>

  <div class="section-title">Rating Providers</div>
  <div id="providers"></div>

  <div class="section-title">General</div>
  <div class="settings-card">
    <div class="field">
      <label for="logLevel">Console log level</label>
      <select id="logLevel">
        <option value="off">Off</option>
        <option value="error" selected>Error</option>
        <option value="warn">Warn</option>
        <option value="info">Info</option>
        <option value="debug">Debug</option>
      </select>
      <div class="hint">Open DevTools console to see logs prefixed with [La Bonne Note]</div>
    </div>
    <div class="field">
      <button id="saveGeneral" style="padding:10px 24px; background:#00CCBC; color:#fff; border:none; border-radius:6px; font-size:14px; cursor:pointer;">Save</button>
      <span id="generalStatus" style="margin-left:10px; font-size:13px;"></span>
    </div>
  </div>

  <div class="footer">
    <a href="https://github.com/HenriChabert/la-bonne-note" target="_blank">Documentation</a>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
