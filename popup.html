<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #333;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 12px 0;
    }
    label {
      display: block;
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
    }
    input[type="password"],
    input[type="number"] {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: #00CCBC;
    }
    button {
      margin-top: 10px;
      width: 100%;
      padding: 8px;
      background: #00CCBC;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover {
      background: #00b8a9;
    }
    #status {
      margin-top: 8px;
      font-size: 12px;
      color: #666;
    }
    #status.saved {
      color: #2e7d32;
    }
    #status.error {
      color: #c62828;
    }
    hr {
      border: none;
      border-top: 1px solid #eee;
      margin: 14px 0;
    }
    .field {
      margin-bottom: 10px;
    }
    .range-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .range-row input[type="range"] {
      flex: 1;
    }
    .range-value {
      font-weight: 600;
      font-size: 13px;
      min-width: 28px;
      text-align: right;
    }
    .toggle-row {
      display: flex;
      gap: 6px;
    }
    .toggle-row button {
      flex: 1;
      margin-top: 0;
      padding: 6px;
      font-size: 12px;
      background: #e8eaed;
      color: #333;
    }
    .toggle-row button.active {
      background: #00CCBC;
      color: #fff;
    }
    .toggle-row button:hover:not(.active) {
      background: #ddd;
    }
  </style>
</head>
<body>
  <h1>La Bonne Note</h1>

  <div class="field">
    <label for="apiKey">Google Places API Key</label>
    <input type="password" id="apiKey" placeholder="AIza...">
  </div>

  <hr>

  <div class="field">
    <label>Minimum Google Maps rating</label>
    <div class="range-row">
      <input type="range" id="minRating" min="0" max="5" step="0.5" value="0">
      <span class="range-value" id="minRatingValue">Off</span>
    </div>
  </div>

  <div class="field">
    <label for="minReviews">Minimum number of reviews</label>
    <input type="number" id="minReviews" min="0" step="10" value="0" placeholder="0 = no filter">
  </div>

  <div class="field">
    <label>Cards below threshold</label>
    <div class="toggle-row">
      <button id="modeDim" class="active">Dim</button>
      <button id="modeHide">Hide</button>
    </div>
  </div>

  <button id="save">Save</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
